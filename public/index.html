<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Not the movie you want. The movie you need.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@1,400;1,500&family=Lora:ital,wght@1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Mobile sticky header (hidden on desktop, shown during results on mobile) -->
  <header class="mobile-header hidden" id="mobileHeader">
    <div>
      <div class="logo-line1">Not the movie you <span class="word-want">want</span>,</div>
      <div class="logo-line2">The movie you <span class="word-need">need</span>.</div>
    </div>
  </header>

  <!-- Logo -->
  <div class="logo-wrap" id="logoWrap">
    <div class="logo-line1">Not the movie you <span class="word-want">want</span>,</div>
    <div class="logo-line2">The movie you <span class="word-need">need</span>.</div>
  </div>

  <!-- Landing -->
  <section class="landing" id="landing">
    <p class="tagline" id="tagline">
      <span class="tagline-main">ANSWER A SHORT QUIZ AND WE WILL TAKE CARE OF YOU</span>
      <span class="tagline-accent">(cinematically)</span>
    </p>
    <button class="start-btn" id="startBtn">start quiz</button>
  </section>

  <!-- Onboarding: age only -->
  <section class="onboarding-section hidden" id="onboardingSection">
    <div class="onboarding-container">
      <div class="ob-step" id="obStepAge">
        <p class="ob-label">before we begin</p>
        <h2 class="ob-question">how old are you?</h2>
        <div class="age-slider-wrap">
          <input type="range" min="0" max="100" value="25" step="1" id="ageSlider" class="age-slider">
          <div class="age-slider-display">
            <span class="age-slider-value" id="ageSliderValue">25</span>
            <span class="age-slider-unit">years old</span>
          </div>
        </div>
        <button class="ob-continue-btn" id="obContinueBtn">continue →</button>
      </div>
    </div>
  </section>

  <!-- Quiz -->
  <section class="quiz-section hidden" id="quizSection">
    <div class="quiz-container" id="quizContainer">
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="question-number" id="questionNumber">1 / 10</div>
      </div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="options"></div>
      <div class="quiz-nav">
        <button class="nav-btn back-btn hidden" id="backBtn">← back</button>
        <div class="nav-right">
          <button class="nav-btn next-btn hidden" id="nextBtn">next →</button>
          <button class="nav-btn submit-btn hidden" id="submitBtn">submit</button>
        </div>
      </div>
    </div>
  </section>

  <!-- Loading -->
  <section class="loading-section hidden" id="loadingSection">
    <div class="loading-inner">
      <div class="film-loader">
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
      </div>
      <p class="loading-text">reading between the lines<span class="loading-ellipsis"></span></p>
      <p class="loading-sub" id="loadingSub">analyzing your psychological profile</p>
    </div>
  </section>

  <!-- Results -->
  <section class="results-section hidden" id="resultsSection">
    <div class="results-inner">
      <div class="rx-page-title">your prescription:</div>
      <div class="recommendations" id="recommendations"></div>
      <div class="our-choice hidden" id="ourChoice"></div>
      <div class="results-footer">
        <button class="reveal-btn" id="revealBtn">what does this say about you?</button>
        <div class="profile-reveal hidden" id="profileReveal">
          <p class="profile-state" id="prescriptionState"></p>
          <p class="profile-need" id="prescriptionNeed"></p>
        </div>
        <div class="footer-actions">
          <button class="share-btn" id="shareBtn">share results</button>
          <button class="restart-btn" id="restartBtn">start over</button>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
